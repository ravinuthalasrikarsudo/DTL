<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeCampus - Emergency Response System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="landing-page">
    <div class="container">
        <header>
            <h1>SAFECAMPUS</h1>
            <p class="tagline">Fast Emergency Response For A Safer Campus</p>
        </header>
        
        <main class="role-selection">
            <div class="selection-card student-card">
                <i class="fas fa-user-graduate"></i>
                <h2>Student</h2>
                <p>Request emergency help and report incidents.</p>
                <a href="student.html" class="btn btn-student">Continue As Student</a>
            </div>
            
            <div class="selection-card authority-card">
                <i class="fas fa-user-shield"></i>
                <h2>Authority</h2>
                <p>Monitor alerts and respond to emergencies.</p>
                <a href="authority.html" class="btn btn-authority">Continue As Authority</a>
            </div>
        </main>
        
        <footer>
            <p>&copy; 2024 SafeCampus - Design Thinking Lab Project</p>
        </footer>
    </div>
</body>
</html>
